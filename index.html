<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>罗峪村村民积分系统</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --green:#3B6D11;--green-light:#639922;--green-bg:#EAF3DE;--green-dark:#27500A;
  --teal:#0F6E56;--teal-bg:#E1F5EE;
  --amber:#BA7517;--amber-bg:#FAEEDA;
  --red:#E24B4A;--red-bg:#FCEBEB;
  --blue:#378ADD;--blue-bg:#E6F1FB;
  --bg:#F5F5F0;--card:#fff;--text:#1a1a1a;--text2:#666;--text3:#999;
  --border:#E8E8E0;--radius:12px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:68px;}

/* ── Login ── */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(160deg,#2d5a0e 0%,#3B6D11 50%,#1a3d08 100%);}
.login-logo{width:72px;height:72px;background:rgba(255,255,255,.15);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.login-logo i{font-size:36px;color:white;}
.login-title{font-size:22px;font-weight:600;color:white;margin-bottom:4px;}
.login-sub{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:36px;}
.login-card{background:white;border-radius:var(--radius);padding:24px;width:100%;max-width:340px;}
.login-card .field{margin-bottom:14px;}
.login-card .field label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px;}
.login-card .field input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;outline:none;transition:border .2s;}
.login-card .field input:focus{border-color:var(--green);}
.login-btn{width:100%;padding:13px;background:var(--green);border:none;border-radius:var(--radius-sm);color:white;font-size:16px;font-weight:500;cursor:pointer;margin-top:4px;transition:opacity .2s;}
.login-btn:disabled{opacity:.6;}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;min-height:18px;}

/* ── Header ── */
.header{background:var(--green);color:white;padding:13px 16px 11px;position:sticky;top:0;z-index:50;}
.header-top{display:flex;align-items:center;justify-content:space-between;}
.header h1{font-size:17px;font-weight:500;color:white;}
.header .sub{font-size:11px;opacity:.75;margin-top:2px;}
.header .logout-btn{background:rgba(255,255,255,.2);border:none;color:white;font-size:12px;padding:5px 10px;border-radius:var(--radius-sm);cursor:pointer;}
.role-tabs{display:flex;gap:6px;margin-top:9px;}
.role-tab{flex:1;padding:6px;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.3);background:transparent;color:rgba(255,255,255,.7);font-size:12px;cursor:pointer;}
.role-tab.active{background:white;color:var(--green);font-weight:500;}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 10px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;}
.nav-item i{font-size:22px;}
.nav-item.active{color:var(--green);}

/* ── Screens ── */
.screen{display:none;flex-direction:column;}
.screen.active{display:flex;}
.scroll{flex:1;padding:12px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;}
.sec-title{font-size:12px;color:var(--text2);font-weight:500;margin-bottom:8px;}

/* ── Hero Score ── */
.hero{background:var(--green);border-radius:var(--radius);padding:16px;color:white;}
.hero .uname{font-size:13px;opacity:.85;margin-bottom:4px;}
.hero .srow{display:flex;align-items:baseline;gap:6px;}
.hero .snum{font-size:44px;font-weight:600;line-height:1;color:white;}
.hero .slbl{font-size:14px;opacity:.8;}
.hero .chg{font-size:12px;opacity:.8;margin-top:5px;}
.hero .rpill{display:inline-block;background:rgba(255,255,255,.2);border-radius:20px;padding:2px 10px;font-size:11px;margin-top:8px;}

/* ── Quick Grid ── */
.qgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.qbtn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.qbtn i{font-size:24px;}
.qbtn .lbl{font-size:12px;color:var(--text2);}
.qbtn.cg i{color:var(--green);}
.qbtn.ct i{color:var(--teal);}
.qbtn.ca i{color:var(--amber);}
.qbtn.cb i{color:var(--blue);}

/* ── Log Items ── */
.log-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.log-item:last-child{border-bottom:none;}
.log-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.log-icon.add{background:var(--green-bg);color:var(--green);}
.log-icon.sub{background:var(--red-bg);color:var(--red);}
.log-info{flex:1;min-width:0;}
.log-evt{font-size:14px;color:var(--text);}
.log-desc{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4;}
.log-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.log-pts{font-size:15px;font-weight:600;flex-shrink:0;}
.log-pts.add{color:var(--green);}
.log-pts.sub{color:var(--red);}
.tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;}
.tg{background:var(--green-bg);color:var(--green-dark);}
.tt{background:var(--teal-bg);color:var(--teal);}
.ta{background:var(--amber-bg);color:var(--amber);}
.tb{background:var(--blue-bg);color:var(--blue);}

/* ── Leaderboard ── */
.lb-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.lb-item:last-child{border-bottom:none;}
.lb-rank{width:24px;text-align:center;font-size:14px;font-weight:600;color:var(--text2);flex-shrink:0;}
.lb-av{width:36px;height:36px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--green-dark);flex-shrink:0;}
.lb-name{flex:1;font-size:14px;}
.lb-grp{font-size:11px;color:var(--text3);}
.lb-score{font-size:15px;font-weight:600;color:var(--green);}

/* ── Exchange ── */
.egrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.ecard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}
.ecard .eicon{font-size:28px;margin-bottom:6px;}
.ecard .ename{font-size:13px;font-weight:500;margin-bottom:3px;}
.ecard .epts{font-size:12px;color:var(--green);font-weight:500;}
.ecard .estock{font-size:11px;color:var(--text3);margin-top:2px;}
.ebtn{margin-top:8px;width:100%;padding:6px;border-radius:var(--radius-sm);border:1px solid var(--green-light);background:var(--green-bg);color:var(--green-dark);font-size:12px;cursor:pointer;}
.ebtn:disabled{opacity:.5;cursor:not-allowed;}

/* ── Notice ── */
.ni{padding:10px 0;border-bottom:1px solid var(--border);}
.ni:last-child{border-bottom:none;}
.ni-title{font-size:14px;font-weight:500;margin:4px 0;}
.ni-body{font-size:12px;color:var(--text2);line-height:1.5;}
.ni-date{font-size:11px;color:var(--text3);margin-top:4px;}

/* ── Admin Stats ── */
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.sc{background:var(--bg);border-radius:var(--radius-sm);padding:12px;}
.sc .slbl{font-size:11px;color:var(--text2);margin-bottom:4px;}
.sc .snum{font-size:24px;font-weight:600;color:var(--text);}
.sc .ssub{font-size:11px;color:var(--text3);margin-top:2px;}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:7px;}
.bar-lbl{font-size:12px;color:var(--text2);width:52px;flex-shrink:0;}
.bar-track{flex:1;height:7px;background:var(--bg);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;}
.bar-val{font-size:12px;font-weight:500;width:28px;text-align:right;}

/* ── Form ── */
.flbl{font-size:12px;color:var(--text2);margin-bottom:4px;}
.frow{margin-bottom:13px;}
.fsel,.finput{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-size:14px;outline:none;}
.fsel:focus,.finput:focus{border-color:var(--green);}
.ftxt{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-size:13px;resize:none;line-height:1.5;outline:none;}
.ftxt:focus{border-color:var(--green);}
.fauto{background:var(--green-bg);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;color:var(--green-dark);font-weight:500;}
.fauto.minus{background:var(--red-bg);color:#791F1F;}
.opt-badge{font-size:10px;color:var(--text3);background:var(--bg);padding:1px 6px;border-radius:8px;margin-left:5px;}
.photo-area{border:1.5px dashed var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.photo-trigger{padding:16px;text-align:center;cursor:pointer;color:var(--text3);font-size:13px;}
.photo-trigger i{font-size:26px;display:block;margin-bottom:3px;}
.photo-preview{display:none;padding:8px;}
.thumb-wrap{display:flex;gap:8px;flex-wrap:wrap;}
.thumb{position:relative;display:inline-block;}
.thumb img{width:70px;height:70px;object-fit:cover;border-radius:var(--radius-sm);display:block;}
.thumb-rm{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:var(--red);border:none;color:white;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.add-more{width:70px;height:70px;border-radius:var(--radius-sm);border:1px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:10px;gap:3px;}
.steps{display:flex;gap:5px;margin-bottom:14px;}
.step-pip{flex:1;height:3px;background:var(--border);border-radius:2px;transition:background .3s;}
.step-pip.done{background:var(--green);}
.sbtn{width:100%;padding:13px;background:var(--green);border:none;border-radius:var(--radius-sm);color:white;font-size:15px;font-weight:500;cursor:pointer;}
.sbtn:disabled{opacity:.6;}

/* ── Pending Review ── */
.pi{display:flex;align-items:center;gap:9px;padding:10px 0;border-bottom:1px solid var(--border);}
.pi:last-child{border-bottom:none;}
.pi-av{width:36px;height:36px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--green-dark);flex-shrink:0;}
.pi-info{flex:1;}
.pi-name{font-size:14px;font-weight:500;}
.pi-evt{font-size:12px;color:var(--text2);margin-top:2px;}
.pi-desc{font-size:11px;color:var(--text3);margin-top:2px;font-style:italic;}
.pi-btns{display:flex;gap:5px;flex-shrink:0;}
.pa{background:var(--green-bg);color:var(--green-dark);border:1px solid var(--green-light);border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;cursor:pointer;}
.pr{background:var(--red-bg);color:#791F1F;border:1px solid #F09595;border-radius:var(--radius-sm);padding:5px 10px;font-size:12px;cursor:pointer;}

/* ── Loading / Empty / Error ── */
.loading{text-align:center;padding:32px;color:var(--text3);font-size:14px;}
.loading i{font-size:28px;display:block;margin-bottom:8px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:13px;}
.empty i{font-size:32px;display:block;margin-bottom:8px;color:var(--border);}

/* ── Toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,.92);color:white;padding:9px 18px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* ── Info strip ── */
.info-strip{background:var(--teal-bg);border-radius:var(--radius-sm);padding:9px 12px;font-size:12px;color:var(--teal);display:flex;gap:7px;align-items:flex-start;}
.warn-strip{background:var(--amber-bg);border-radius:var(--radius-sm);padding:9px 12px;font-size:12px;color:var(--amber);display:flex;gap:7px;align-items:flex-start;}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="loginScreen" class="login-screen">
  <div class="login-logo"><i class="ti ti-award"></i></div>
  <div class="login-title">罗峪村村民积分</div>
  <div class="login-sub">湖南体育职业学院驻村工作队</div>
  <div class="login-card">
    <div class="field">
      <label>用户名</label>
      <input type="text" id="loginUser" placeholder="请输入管理员账号" autocomplete="username">
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">登 录</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ============ MAIN APP ============ -->
<div id="mainApp" class="app" style="display:none;">

  <!-- Header -->
  <div class="header" id="appHeader">
    <div class="header-top">
      <div>
        <h1 id="headerTitle">罗峪村村民积分</h1>
        <div class="sub" id="headerSub">湖南体育职业学院驻村工作队</div>
      </div>
      <button class="logout-btn" onclick="doLogout()">退出登录</button>
    </div>
    <div class="role-tabs" id="roleTabs">
      <button class="role-tab active" onclick="setRole('villager')">村民视图</button>
      <button class="role-tab" onclick="setRole('admin')">管理员</button>
    </div>
  </div>

  <!-- ===== VILLAGER SCREENS ===== -->
  <!-- 首页 -->
  <div class="screen active" id="sv-home">
    <div class="scroll" id="homeScroll">
      <div class="loading"><i class="ti ti-loader"></i>加载中…</div>
    </div>
  </div>

  <!-- 明细 -->
  <div class="screen" id="sv-log">
    <div class="scroll" id="logScroll">
      <div class="loading"><i class="ti ti-loader"></i>加载中…</div>
    </div>
  </div>

  <!-- 排行 -->
  <div class="screen" id="sv-rank">
    <div class="scroll" id="rankScroll">
      <div class="loading"><i class="ti ti-loader"></i>加载中…</div>
    </div>
  </div>

  <!-- 兑换 -->
  <div class="screen" id="sv-exchange">
    <div class="scroll" id="exchangeScroll">
      <div class="loading"><i class="ti ti-loader"></i>加载中…</div>
    </div>
  </div>

  <!-- 公告 -->
  <div class="screen" id="sv-notice">
    <div class="scroll" id="noticeScroll">
      <div class="loading"><i class="ti ti-loader"></i>加载中…</div>
    </div>
  </div>

  <!-- ===== ADMIN SCREENS ===== -->
  <!-- 工作台 -->
  <div class="screen" id="sa-home" style="display:none;">
    <div class="scroll" id="adminHomeScroll">
      <div class="loading"><i class="ti ti-loader"></i>加载中…</div>
    </div>
  </div>

  <!-- 录入 -->
  <div class="screen" id="sa-record" style="display:none;">
    <div class="scroll">
      <div class="steps" id="stepRow">
        <div class="step-pip done" id="sp1"></div>
        <div class="step-pip" id="sp2"></div>
        <div class="step-pip" id="sp3"></div>
        <div class="step-pip" id="sp4"></div>
      </div>
      <div class="card">
        <!-- 步骤1 选村民 -->
        <div class="frow">
          <div class="flbl">第1步 · 选择村民</div>
          <div id="villagerSearchBox">
            <input class="finput" id="villagerInput" placeholder="输入姓名或组别搜索…" oninput="searchVillager(this.value)" onfocus="showVillagerDrop()" autocomplete="off">
            <div id="villagerDrop" style="border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius-sm) var(--radius-sm);max-height:180px;overflow-y:auto;display:none;background:white;position:relative;z-index:10;"></div>
          </div>
          <div id="villagerSelected" style="display:none;">
            <div style="background:var(--green-bg);border-radius:var(--radius-sm);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-size:14px;font-weight:500;color:var(--green-dark);" id="selVName"></div>
                <div style="font-size:11px;color:var(--green);margin-top:2px;" id="selVMeta"></div>
              </div>
              <button onclick="clearVillager()" style="background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;">×</button>
            </div>
          </div>
        </div>
        <!-- 步骤2 事件 -->
        <div class="frow">
          <div class="flbl">第2步 · 选择事件类型</div>
          <select class="fsel" id="selEvent" onchange="onEventChange()">
            <option value="">请选择事件…</option>
          </select>
        </div>
        <div class="frow" id="ptsRow" style="display:none;">
          <div class="flbl">分值（自动填充）</div>
          <div class="fauto" id="ptsAuto"></div>
        </div>
        <!-- 步骤3 说明 -->
        <div class="frow">
          <div class="flbl">第3步 · 情况说明<span class="opt-badge">可选</span></div>
          <textarea class="ftxt" id="descTxt" rows="3" placeholder="简要描述事件经过，如地点、人数、时长等…" oninput="onDescInput()"></textarea>
          <div style="text-align:right;font-size:11px;color:var(--text3);margin-top:3px;"><span id="charCount">0</span>/100字</div>
        </div>
        <!-- 步骤4 图片 -->
        <div class="frow">
          <div class="flbl">第4步 · 凭证图片<span class="opt-badge">可选</span></div>
          <div class="photo-area">
            <div class="photo-preview" id="photoPreview">
              <div class="thumb-wrap" id="thumbsArea"></div>
            </div>
            <div class="photo-trigger" id="photoTrigger" onclick="document.getElementById('fileInput').click()">
              <i class="ti ti-camera-plus"></i>点击拍照或选择图片
            </div>
          </div>
          <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" onchange="handleFiles(this)">
          <div style="font-size:11px;color:var(--text3);margin-top:4px;">最多4张，单张不超过5MB</div>
        </div>
        <button class="sbtn" id="submitBtn" onclick="submitScore()">
          <i class="ti ti-check" style="vertical-align:-2px;margin-right:4px;"></i>提交积分
        </button>
      </div>
      <div class="info-strip"><i class="ti ti-clock" style="font-size:15px;flex-shrink:0;"></i>平均录入不超过30秒 · 组长录入需村干部审核</div>
    </div>
  </div>

  <!-- 审核 -->
  <div class="screen" id="sa-review" style="display:none;">
    <div class="scroll" id="reviewScroll">
      <div class="loading"><i class="ti ti-loader"></i>加载中…</div>
    </div>
  </div>

  <!-- Villager Bottom Nav -->
  <nav class="bottom-nav" id="vNav">
    <button class="nav-item active" onclick="vTab('home')" data-t="home"><i class="ti ti-home"></i><span>首页</span></button>
    <button class="nav-item" onclick="vTab('log')" data-t="log"><i class="ti ti-list-details"></i><span>明细</span></button>
    <button class="nav-item" onclick="vTab('rank')" data-t="rank"><i class="ti ti-trophy"></i><span>排行</span></button>
    <button class="nav-item" onclick="vTab('exchange')" data-t="exchange"><i class="ti ti-gift"></i><span>兑换</span></button>
    <button class="nav-item" onclick="vTab('notice')" data-t="notice"><i class="ti ti-bell"></i><span>公告</span></button>
  </nav>

  <!-- Admin Bottom Nav -->
  <nav class="bottom-nav" id="aNav" style="display:none;">
    <button class="nav-item active" onclick="aTab('home')" data-t="home"><i class="ti ti-layout-dashboard"></i><span>工作台</span></button>
    <button class="nav-item" onclick="aTab('record')" data-t="record"><i class="ti ti-edit"></i><span>录入</span></button>
    <button class="nav-item" onclick="aTab('review')" data-t="review"><i class="ti ti-clipboard-check"></i><span>审核</span></button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = 'http://8.148.73.9:3000';
let token = localStorage.getItem('luoyu_token') || '';
let adminInfo = JSON.parse(localStorage.getItem('luoyu_admin') || 'null');
let isAdmin = false;
let villagers = [];
let events = [];
let currentVillager = null;
let uploadedPhotos = [];

// ── API helper ──
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  return r.json();
}

async function apiForm(path, form) {
  const r = await fetch(BASE + path, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token },
    body: form
  });
  return r.json();
}

// ── Login ──
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (!u || !p) { document.getElementById('loginErr').textContent = '请填写用户名和密码'; return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中…';
  try {
    const res = await api('POST', '/api/auth/login', { username: u, password: p });
    if (res.code === 0) {
      token = res.data.token;
      adminInfo = res.data.admin;
      localStorage.setItem('luoyu_token', token);
      localStorage.setItem('luoyu_admin', JSON.stringify(adminInfo));
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      initApp();
    } else {
      document.getElementById('loginErr').textContent = res.message || '登录失败';
    }
  } catch(e) {
    document.getElementById('loginErr').textContent = '网络连接失败，请检查网络';
  }
  btn.disabled = false; btn.textContent = '登 录';
}

document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
  token = ''; adminInfo = null;
  localStorage.removeItem('luoyu_token');
  localStorage.removeItem('luoyu_admin');
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginErr').textContent = '';
}

// ── Init ──
function initApp() {
  document.getElementById('headerSub').textContent = adminInfo.name + ' · ' + roleLabel(adminInfo.role);
  loadEvents();
  loadVillagersAll();
  setRole('villager');
}

function roleLabel(r) {
  return r==='super'?'超级管理员':r==='village_admin'?'村干部':'组长';
}

function setRole(r) {
  isAdmin = r === 'admin';
  document.querySelectorAll('.role-tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&!isAdmin)||(i===1&&isAdmin)));
  document.getElementById('vNav').style.display = isAdmin ? 'none' : 'flex';
  document.getElementById('aNav').style.display = isAdmin ? 'flex' : 'none';
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  if (isAdmin) { aTab('home'); } else { vTab('home'); }
}

// ── Villager tabs ──
function vTab(t) {
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const el = document.getElementById('sv-'+t);
  if (el) { el.style.display='flex'; el.classList.add('active'); }
  document.querySelectorAll('#vNav .nav-item').forEach(n=>n.classList.toggle('active',n.dataset.t===t));
  if (t==='home') loadHome();
  else if (t==='log') loadLog();
  else if (t==='rank') loadRank();
  else if (t==='exchange') loadExchange();
  else if (t==='notice') loadNotice();
}

// ── Admin tabs ──
function aTab(t) {
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const el = document.getElementById('sa-'+t);
  if (el) { el.style.display='flex'; el.classList.add('active'); }
  document.querySelectorAll('#aNav .nav-item').forEach(n=>n.classList.toggle('active',n.dataset.t===t));
  if (t==='home') loadAdminHome();
  else if (t==='review') loadReview();
}

// ── Load home ──
async function loadHome() {
  const el = document.getElementById('homeScroll');
  el.innerHTML = '<div class="loading"><i class="ti ti-loader"></i>加载中…</div>';
  try {
    const res = await api('GET', '/api/villagers/' + (adminInfo.id || 1));
    const v = res.data || {};
    el.innerHTML = `
      <div class="hero">
        <div class="uname">${v.group_no||'--'} · ${v.name||adminInfo.name} &nbsp;<span style="font-size:11px;opacity:.7;">${v.gender||''} · ****${v.id_last4||'----'}</span></div>
        <div class="srow"><div class="snum">${v.total_score||0}</div><div class="slbl">积分</div></div>
        <div class="chg">本月 +${v.month_score||0}分</div>
        <div class="rpill">组内第 ${v.group_rank||'-'} 名</div>
      </div>
      <div>
        <div class="sec-title">快捷功能</div>
        <div class="qgrid">
          <button class="qbtn cg" onclick="vTab('log')"><i class="ti ti-clipboard-list"></i><span class="lbl">积分明细</span></button>
          <button class="qbtn ct" onclick="vTab('rank')"><i class="ti ti-trophy"></i><span class="lbl">组内排行</span></button>
          <button class="qbtn ca" onclick="vTab('exchange')"><i class="ti ti-gift"></i><span class="lbl">积分兑换</span></button>
          <button class="qbtn cb" onclick="vTab('notice')"><i class="ti ti-bell"></i><span class="lbl">村务公告</span></button>
        </div>
      </div>`;
    loadRecentLog(el);
  } catch(e) { el.innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>加载失败，请检查网络</div>'; }
}

async function loadRecentLog(container) {
  try {
    const res = await api('GET', '/api/scores?limit=3');
    if (!res.data || !res.data.length) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<div class="sec-title">近期动态</div>' + res.data.map(r=>logItemHtml(r)).join('');
    container.appendChild(card);
  } catch(e) {}
}

// ── Load log ──
async function loadLog() {
  const el = document.getElementById('logScroll');
  el.innerHTML = '<div class="loading"><i class="ti ti-loader"></i>加载中…</div>';
  try {
    const res = await api('GET', '/api/scores?limit=50');
    if (!res.data || !res.data.length) {
      el.innerHTML = '<div class="empty"><i class="ti ti-clipboard-x"></i>暂无积分记录</div>'; return;
    }
    el.innerHTML = `<div class="card">${res.data.map(r=>logItemHtml(r)).join('')}</div>`;
  } catch(e) { el.innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>加载失败</div>'; }
}

function logItemHtml(r) {
  const add = r.points > 0;
  const catColor = {'党建引领':'ta','体育特色':'tg','生态保护':'tt','公共参与':'tb','互帮互助':'tt','特殊贡献':'ta','扣分项目':''}[r.category]||'tg';
  const hasImg = r.image_urls && r.image_urls.length > 0;
  return `<div class="log-item">
    <div class="log-icon ${add?'add':'sub'}"><i class="ti ${add?'ti-plus':'ti-minus'}" style="font-size:14px;"></i></div>
    <div class="log-info">
      <div class="log-evt">${r.event_name}</div>
      ${r.description?`<div class="log-desc">${r.description}</div>`:''}
      <div class="log-meta">
        <span>${r.created_at?r.created_at.slice(0,10):''}</span>
        ${hasImg?'<span style="background:var(--blue-bg);color:var(--blue);padding:1px 5px;border-radius:6px;font-size:10px;"><i class="ti ti-photo" style="font-size:10px;"></i> 有图片</span>':''}
        ${r.status==='pending'?'<span style="background:var(--amber-bg);color:var(--amber);padding:1px 5px;border-radius:6px;font-size:10px;">待审核</span>':''}
      </div>
    </div>
    <div class="log-pts ${add?'add':'sub'}">${add?'+':''}${r.points}</div>
  </div>`;
}

// ── Load rank ──
async function loadRank() {
  const el = document.getElementById('rankScroll');
  el.innerHTML = '<div class="loading"><i class="ti ti-loader"></i>加载中…</div>';
  try {
    const res = await api('GET', '/api/villagers/group/rank?group_no=' + encodeURIComponent(adminInfo.group_no||''));
    if (!res.data || !res.data.length) {
      el.innerHTML = '<div class="empty"><i class="ti ti-users"></i>暂无排行数据</div>'; return;
    }
    const ranks = ['🥇','🥈','🥉'];
    const rows = res.data.map((v,i)=>`
      <div class="lb-item">
        <div class="lb-rank">${ranks[i]||i+1}</div>
        <div class="lb-av">${v.name?v.name[0]:'?'}</div>
        <div style="flex:1"><div class="lb-name">${v.name}</div><div class="lb-grp">${v.gender||''} · ${v.group_no||''} · 本月+${v.month_score||0}</div></div>
        <div class="lb-score">${v.total_score}</div>
      </div>`).join('');
    el.innerHTML = `
      <div class="info-strip"><i class="ti ti-eye-off" style="font-size:15px;flex-shrink:0;"></i>排行仅本组成员可见，扣分不计入排行</div>
      <div class="card">${rows}</div>`;
  } catch(e) { el.innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>加载失败</div>'; }
}

// ── Load exchange ──
async function loadExchange() {
  const el = document.getElementById('exchangeScroll');
  el.innerHTML = '<div class="loading"><i class="ti ti-loader"></i>加载中…</div>';
  try {
    const res = await api('GET', '/api/exchange/goods');
    if (!res.data || !res.data.length) { el.innerHTML = '<div class="empty"><i class="ti ti-gift"></i>暂无可兑换物资</div>'; return; }
    const cards = res.data.map(g=>`
      <div class="ecard">
        <div class="eicon">${g.icon||'🎁'}</div>
        <div class="ename">${g.name}</div>
        <div class="epts">${g.points_cost}分</div>
        <div class="estock">库存 ${g.stock} 件</div>
        <button class="ebtn" ${g.stock<1?'disabled':''} onclick="doExchange(${g.id},'${g.name}',${g.points_cost})">
          ${g.stock<1?'已售罄':'立即兑换'}
        </button>
      </div>`).join('');
    el.innerHTML = `
      <div class="info-strip"><i class="ti ti-info-circle" style="font-size:15px;flex-shrink:0;"></i>最低兑换门槛 <strong>20分</strong>，剩余积分不清零</div>
      <div class="egrid">${cards}</div>`;
  } catch(e) { el.innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>加载失败</div>'; }
}

async function doExchange(gid, name, pts) {
  if (!confirm(`确认兑换【${name}】，消耗 ${pts} 分？`)) return;
  const res = await api('POST', '/api/exchange', { villager_id: adminInfo.id, goods_id: gid });
  showToast(res.message || '兑换完成');
  if (res.code === 0) loadExchange();
}

// ── Load notice ──

  const el = document.getElementById('noticeScroll');
  el.innerHTML = '<div class="loading"><i class="ti ti-loader"></i>加载中…</div>';
  try {
    const res = await api('GET', '/api/announcements');
    if (!res.data || !res.data.length) { el.innerHTML = '<div class="empty"><i class="ti ti-bell-off"></i>暂无公告</div>'; return; }

        <div class="ni-title">${n.title}</div>
        <div class="ni-body">${n.content}</div>
        <div class="ni-date">${n.created_at?n.created_at.slice(0,10):''}</div>
      </div>`).join('');
    el.innerHTML = `<div class="card">${items}</div>`;
  } catch(e) { el.innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>加载失败</div>'; }
}

// ── Admin home ──
async function loadAdminHome() {
  const el = document.getElementById('adminHomeScroll');
  el.innerHTML = '<div class="loading"><i class="ti ti-loader"></i>加载中…</div>';
  try {
    const res = await api('GET', '/api/scores/stats');
    const s = res.data?.summary || {};
    const cats = res.data?.by_category || [];
    const maxVal = cats.length ? Math.max(...cats.map(c=>c.total)) : 1;
    const catColors = {'党建引领':'#BA7517','体育特色':'#639922','生态保护':'#1D9E75','公共参与':'#378ADD','互帮互助':'#a855f7','纠纷调解':'#E24B4A'};
    const bars = cats.map(c=>`
      <div class="bar-row">
        <div class="bar-lbl">${c.category}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(c.total/maxVal*100)}%;background:${catColors[c.category]||'#639922'};"></div></div>
        <div class="bar-val">${c.total}</div>
      </div>`).join('');
    el.innerHTML = `
      <div class="sgrid">
        <div class="sc"><div class="slbl">全村总积分</div><div class="snum">${(s.total_score||0).toLocaleString()}</div></div>
        <div class="sc"><div class="slbl">活跃村民</div><div class="snum">${s.active_villagers||0}<span style="font-size:13px;color:var(--text3);">/${s.total_villagers||0}</span></div></div>
        <div class="sc"><div class="slbl">待审核</div><div class="snum" style="color:var(--amber);">${s.pending_count||0}</div></div>
        <div class="sc"><div class="slbl">本月兑换</div><div class="snum">${s.month_exchanges||0}</div></div>
      </div>
      <div>
        <div class="sec-title">积分分类（本月）</div>
        <div class="card">${bars||'<div class="empty" style="padding:16px;font-size:13px;">本月暂无积分数据</div>'}</div>
      </div>
      <div class="qgrid">
        <button class="qbtn cg" onclick="aTab('record')"><i class="ti ti-edit"></i><span class="lbl">录入积分</span></button>
        <button class="qbtn ca" onclick="aTab('review')"><i class="ti ti-clipboard-check"></i><span class="lbl">审核记录 ${s.pending_count?`<span style="background:var(--red);color:white;font-size:9px;border-radius:8px;padding:1px 5px;">${s.pending_count}</span>`:''}</span></button>
      </div>`;
  } catch(e) { el.innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>加载失败</div>'; }
}

// ── Load review ──
async function loadReview() {
  const el = document.getElementById('reviewScroll');
  el.innerHTML = '<div class="loading"><i class="ti ti-loader"></i>加载中…</div>';
  try {
    const res = await api('GET', '/api/scores?status=pending&limit=50');
    if (!res.data || !res.data.length) {
      el.innerHTML = '<div class="empty"><i class="ti ti-circle-check" style="color:var(--green);"></i>暂无待审核记录</div>'; return;
    }
    const items = res.data.map(r=>`
      <div class="pi" id="rv${r.id}">
        <div class="pi-av">${r.villager_name?r.villager_name[0]:'?'}</div>
        <div class="pi-info">
          <div class="pi-name">${r.villager_name} &nbsp;<span class="tag ${r.points>0?'tg':''}">
            ${r.points>0?'+':''}${r.points}分</span></div>
          <div class="pi-evt">${r.event_name} · ${r.submitted_by_name||''} · ${r.created_at?r.created_at.slice(5,10):''}</div>
          ${r.description?`<div class="pi-desc">${r.description}</div>`:''}
        </div>
        <div class="pi-btns">
          <button class="pa" onclick="doReview(${r.id},'approve')">通过</button>
          <button class="pr" onclick="doReview(${r.id},'reject')">驳回</button>
        </div>
      </div>`).join('');
    el.innerHTML = `
      <div class="warn-strip"><i class="ti ti-alert-circle" style="font-size:15px;flex-shrink:0;"></i>${res.data.length} 条记录待审核</div>
      <div class="card" id="reviewList">${items}</div>`;
  } catch(e) { el.innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>加载失败</div>'; }
}

async function doReview(id, action) {
  const el = document.getElementById('rv'+id);
  if (el) { el.style.opacity='.4'; el.style.pointerEvents='none'; }
  const res = await api('PATCH', `/api/scores/${id}/review`, { action });
  showToast(res.message || (action==='approve'?'已通过':'已驳回'));
}

// ── Load events ──
async function loadEvents() {
  try {
    const res = await api('GET', '/api/scores/events');
    events = res.data || [];
    const sel = document.getElementById('selEvent');
    const groups = {};
    events.forEach(e => { if (!groups[e.category]) groups[e.category]=[];groups[e.category].push(e); });
    let opts = '<option value="">请选择事件…</option>';
    for (const [cat, evts] of Object.entries(groups)) {
      opts += `<optgroup label="${cat}">`;
      evts.forEach(e => { opts += `<option value="${e.id}" data-pts="${e.points}">${e.name} ${e.points>0?'+':''}${e.points}分</option>`; });
      opts += '</optgroup>';
    }
    sel.innerHTML = opts;
  } catch(e) {}
}

// ── Load villagers ──
async function loadVillagersAll() {
  try {
    const res = await api('GET', '/api/villagers?limit=200');
    villagers = res.data || [];
  } catch(e) {}
}

// ── Villager search ──
function searchVillager(q) {
  const drop = document.getElementById('villagerDrop');
  const list = q ? villagers.filter(v=>v.name.includes(q)||v.group_no.includes(q)) : villagers.slice(0,20);
  if (!list.length) { drop.style.display='none'; return; }
  drop.innerHTML = list.map(v=>`
    <div onclick="selectVillager(${v.id})" style="padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;">
      <div style="font-weight:500;">${v.name}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px;">${v.group_no} · ${v.gender} · 身份证后4位：${v.id_last4}</div>
    </div>`).join('');
  drop.style.display='block';
}

function showVillagerDrop() {
  const q = document.getElementById('villagerInput').value;
  searchVillager(q);
}

function selectVillager(id) {
  currentVillager = villagers.find(v=>v.id===id);
  if (!currentVillager) return;
  document.getElementById('villagerSearchBox').style.display='none';
  document.getElementById('villagerSelected').style.display='block';
  document.getElementById('selVName').textContent = currentVillager.name;
  document.getElementById('selVMeta').textContent = `${currentVillager.group_no} · ${currentVillager.gender} · ****${currentVillager.id_last4}`;
  document.getElementById('villagerDrop').style.display='none';
  updateSteps();
}

function clearVillager() {
  currentVillager = null;
  document.getElementById('villagerSearchBox').style.display='block';
  document.getElementById('villagerSelected').style.display='none';
  document.getElementById('villagerInput').value='';
  updateSteps();
}

document.addEventListener('click', e=>{
  const box = document.getElementById('villagerSearchBox');
  if (box && !box.contains(e.target)) document.getElementById('villagerDrop').style.display='none';
});

// ── Score form ──
function onEventChange() {
  const sel = document.getElementById('selEvent');
  const opt = sel.options[sel.selectedIndex];
  const pts = opt ? parseInt(opt.dataset.pts) : null;
  if (pts !== null && !isNaN(pts)) {
    document.getElementById('ptsRow').style.display='';
    const el = document.getElementById('ptsAuto');
    el.textContent = (pts>0?'+':'') + pts + ' 分';
    el.className = 'fauto' + (pts<0?' minus':'');
  } else {
    document.getElementById('ptsRow').style.display='none';
  }
  updateSteps();
}

function onDescInput() {
  const v = document.getElementById('descTxt').value;
  if (v.length > 100) document.getElementById('descTxt').value = v.slice(0,100);
  document.getElementById('charCount').textContent = Math.min(v.length,100);
  updateSteps();
}

function updateSteps() {
  const s1 = !!currentVillager;
  const s2 = !!document.getElementById('selEvent').value;
  const s3 = document.getElementById('descTxt').value.length > 0 || uploadedPhotos.length > 0;
  [true, s1, s2, s2&&s3].forEach((done,i)=>{
    document.getElementById('sp'+(i+1)).classList.toggle('done', done);
  });
}

function handleFiles(input) {
  Array.from(input.files).forEach(file=>{
    if (file.size > 5*1024*1024) { showToast('图片超过5MB，请压缩后上传'); return; }
    const reader = new FileReader();
    reader.onload = e => { uploadedPhotos.push({data:e.target.result, file}); renderThumbs(); };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function renderThumbs() {
  const area = document.getElementById('thumbsArea');
  const preview = document.getElementById('photoPreview');
  const trigger = document.getElementById('photoTrigger');
  if (uploadedPhotos.length) {
    preview.style.display='block'; trigger.style.display='none';
    area.innerHTML = uploadedPhotos.map((p,i)=>`
      <div class="thumb">
        <img src="${p.data}">
        <button class="thumb-rm" onclick="removePhoto(${i})">×</button>
      </div>`).join('');
    if (uploadedPhotos.length < 4) {
      area.innerHTML += `<div class="add-more" onclick="document.getElementById('fileInput').click()">
        <i class="ti ti-plus" style="font-size:20px;"></i><span>添加</span></div>`;
    }
  } else {
    preview.style.display='none'; trigger.style.display='block';
  }
  updateSteps();
}

function removePhoto(i) { uploadedPhotos.splice(i,1); renderThumbs(); }

async function submitScore() {
  if (!currentVillager) { showToast('请先选择村民'); return; }
  const eventId = document.getElementById('selEvent').value;
  if (!eventId) { showToast('请选择事件类型'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='提交中…';

  try {
    const form = new FormData();
    form.append('villager_id', currentVillager.id);
    form.append('event_id', eventId);
    const desc = document.getElementById('descTxt').value.trim();
    if (desc) form.append('description', desc);
    uploadedPhotos.forEach(p=>form.append('images', p.file));

    const res = await apiForm('/api/scores', form);
    showToast(res.message || '提交成功');
    if (res.code===0) {
      clearVillager();
      document.getElementById('selEvent').value='';
      document.getElementById('ptsRow').style.display='none';
      document.getElementById('descTxt').value='';
      document.getElementById('charCount').textContent='0';
      uploadedPhotos=[]; renderThumbs();
      [1,2,3,4].forEach(i=>document.getElementById('sp'+i).classList.toggle('done',i===1));
    }
  } catch(e) { showToast('提交失败，请重试'); }
  btn.disabled=false; btn.textContent='提交积分';
  btn.innerHTML='<i class="ti ti-check" style="vertical-align:-2px;margin-right:4px;"></i>提交积分';
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── Auto login if token exists ──
if (token && adminInfo) {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  initApp();
}
</script>
</body>
